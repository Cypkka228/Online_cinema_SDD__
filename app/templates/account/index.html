{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-box">
        <h1>{{ title }}</h1>
        <form method="POST">
            {{ form.hidden_tag() }}
            <div class="form-group">
                {{ form.username.label }}
                {{ form.username(class="form-control") }}
            </div>
            <div class="form-group">
                {{ form.password.label }}
                {{ form.password(class="form-control") }}
            </div>
            <button type="submit" class="btn-primary">{{ 'Войти' if title == 'Авторизация' else 'Зарегистрироваться' }}</button>
        </form>
    </div>
</div>
{% endblock %}
