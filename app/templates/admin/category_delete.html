{% extends "base.html" %}
{% block title %}Удалить категорию{% endblock %}
{% block content %}
<div class="admin-container">
    <h1>Удалить категорию</h1>
    <p style="color:var(--muted); margin-bottom:24px;">Вы уверены, что хотите удалить категорию <strong style="color:var(--accent)">{{ category.name }}</strong>?</p>
    <form method="POST">
        <button type="submit" class="btn-sm btn-delete" style="padding:10px 24px; font-size:14px;">Да, удалить</button>
        <a href="{{ url_for('admin_category_list') }}" style="margin-left:12px; color:var(--muted);">Отмена</a>
    </form>
</div>
{% endblock %}
